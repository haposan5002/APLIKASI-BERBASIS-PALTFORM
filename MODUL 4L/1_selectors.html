<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: blue;
      color: white; /* Added for contrast */
    }

    h1 {
      color: maroon;
      margin-left: 40px;
    }

    /* Selector dengan Elemen HTML */
    p {
      text-align: center;
      color: white;
    }

    /* Selector dengan Id Elemen HTML */
    #para1 {
      text-align: center;
      color: yellow;
    }

    /* Selector dengan Class Elemen HTML */
    p.center {
      text-align: center;
      color: green;
    }
  </style>
</head>
<body>
  <h1>Contoh Internal Style & Selectors</h1>
  <p>Ini adalah paragraf dengan elemen selector P.</p>
  <p id="para1">Ini adalah paragraf dengan id selector #para1.</p>
  <p class="center">Ini adalah paragraf dengan class selector .center.</p>
  
  <h1 style="color:lightblue; font-size:30px;">Praktikum Web Programming (Inline CSS)</h1>
</body>
</html>
