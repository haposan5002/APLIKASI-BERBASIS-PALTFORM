<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: hsl(20%, 40%, 70%);
      color: orange;
    }

    #teks {
      color: #2f3cdf;
    }

    /* dengan opacity sebesar 0.5 */
    input.text-field {
      background-color: rgba(32, 55, 122, 0.5);
      color: white;
    }
  </style>
</head>
<body>
  <h2>CSS Colors</h2>
  <p id="teks">Teks dengan warna HEX: #2F3CDF.</p>
  <p>Teks ini berwarna orange dengan latar belakang HSL pada tag body.</p>
  
  <label for="input">Field dengan RGBA Background:</label>
  <input type="text" id="input" class="text-field" value="Test Input">
</body>
</html>
