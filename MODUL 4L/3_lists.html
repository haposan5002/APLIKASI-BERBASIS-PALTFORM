<!DOCTYPE html>
<html>
<head>
  <style>
    ul.listsatu {
      background-color: tomato;
      margin: 10px 5px 10px 5px;
      list-style-type: lower-alpha;
      list-style-position: inside;
    }
    ol.listdua {
      background-color: lightblue;
      list-style-type: lower-roman;
      padding: 5px 5px 15px 15px;
      list-style-position: inside;
    }
  </style>
</head>
<body>
  <h3>List of Property & CSS</h3>
  <ul class="listsatu">
    <li>Indoor</li>
    <li>Sofa</li>
    <li>Tanaman Hias</li>
  </ul>
  
  <ol class="listdua">
    <li>Outdoor</li>
    <li>Payung Pantai</li>
    <li>Ayunan</li>
  </ol>
</body>
</html>
