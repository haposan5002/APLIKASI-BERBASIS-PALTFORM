<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Image & Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4 text-center">
        <h2>Thumbnail & Fluid Image</h2>
        <img src="https://images.unsplash.com/photo-1506744626753-1fa44f434076?w=400&h=300" class="img-thumbnail" alt="Cinque Terre Thumbnail">
        <br><br>
        <img src="https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=600&h=200" class="img-fluid" alt="Responsive image">
        
        <h4 class="mt-4">Button Styles</h4>
        <button type="button" class="btn btn-secondary">Secondary</button>
        <button type="button" class="btn btn-primary btn-lg">Primary</button>
        <button type="button" class="btn btn-success">Success</button>
        <button type="button" class="btn btn-info btn-sm">Info</button>
        <button type="button" class="btn btn-warning">Warning</button>
        <button type="button" class="btn btn-danger">Danger</button>
        <button type="button" class="btn btn-link">Link</button>
    </div>
</body>
</html>
