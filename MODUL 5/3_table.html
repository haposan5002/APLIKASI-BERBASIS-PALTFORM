<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Bootstrap Table Hover</h2>
        <table class="table table-hover table-striped">
            <thead class="table-dark">
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Nama Lengkap</th>
                    <th scope="col">Asal Kota</th>
                    <th scope="col">Umur</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="row">1</th>
                    <td>Budi Rojadi</td>
                    <td>Semarang</td>
                    <td>35 th</td>
                </tr>
                <tr>
                    <th scope="row">2</th>
                    <td>Yulia Santi</td>
                    <td>Bekasi</td>
                    <td>32 th</td>
                </tr>
                <tr>
                    <th scope="row">3</th>
                    <td>Fahri Abdilah</td>
                    <td>Medan</td>
                    <td>38 th</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
